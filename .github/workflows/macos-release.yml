name: macOS release pipeline

# Builds the self-contained macOS JARVIS.app + DMG.
#
# Jobs:
#   unit-tests      Packaging/signing/manifest/app-paths unit tests (no secrets).
#   build-unsigned  Freeze JARVIS.app, build the DMG, generate the manifest,
#                   verify the bundle, run the structural smoke check, upload it.
#   sign-notarize   Developer ID signing + notarization. Runs ONLY when the
#                   protected signing secrets are present. Never echoes secrets.
#
# Secrets are optional. Without them, this workflow still produces and uploads an
# honest UNSIGNED development artifact and never claims distribution readiness.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version MAJOR.MINOR.PATCH"
        required: true
        default: "0.1.0"
      build:
        description: "Positive global build number"
        required: true
        default: "1"
  push:
    branches: ["codex/product-release-hardening"]
    paths:
      - "packaging/**"
      - "scripts/build_macos_release.py"
      - "scripts/release_pipeline.py"
      - "core/platform_adapters/release_*.py"
      - "core/release_build_manifest.py"
      - "core/app_paths.py"
      - "requirements-build.txt"
      - ".github/workflows/macos-release.yml"

permissions:
  contents: read

env:
  JARVIS_BUILD_VERSION: ${{ github.event.inputs.version || '0.1.0' }}
  JARVIS_BUILD_NUMBER: ${{ github.event.inputs.build || '1' }}

jobs:
  unit-tests:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Create isolated build venv
        run: |
          python3.12 -m venv "$RUNNER_TEMP/build-venv"
          "$RUNNER_TEMP/build-venv/bin/python" -m pip install --upgrade pip
          "$RUNNER_TEMP/build-venv/bin/python" -m pip install -r requirements.txt -r requirements-build.txt
      - name: Compile check
        run: |
          "$RUNNER_TEMP/build-venv/bin/python" -m py_compile main.py scripts/release_pipeline.py
      - name: Packaging unit tests
        run: |
          "$RUNNER_TEMP/build-venv/bin/python" -m pytest -q \
            tests/test_release_packaging.py \
            tests/test_release_signing.py \
            tests/test_release_build_manifest.py \
            tests/test_release_bundle_contract.py \
            tests/test_release_pipeline.py \
            tests/test_app_paths.py

  build-unsigned:
    needs: unit-tests
    runs-on: macos-14
    outputs:
      workspace: ${{ steps.locate.outputs.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Create isolated build venv
        run: |
          python3.12 -m venv "$RUNNER_TEMP/build-venv"
          "$RUNNER_TEMP/build-venv/bin/python" -m pip install --upgrade pip
          "$RUNNER_TEMP/build-venv/bin/python" -m pip install -r requirements.txt -r requirements-build.txt
      - name: Write build-input product config
        env:
          # A non-secret, validated CI product config. Provide a real one via a
          # protected secret to build against production trust roots.
          PRODUCT_CONFIG_JSON: ${{ secrets.JARVIS_PRODUCT_CONFIG_JSON }}
        run: |
          mkdir -p "$RUNNER_TEMP/build-input"
          if [ -n "$PRODUCT_CONFIG_JSON" ]; then
            printf '%s' "$PRODUCT_CONFIG_JSON" > "$RUNNER_TEMP/build-input/product.json"
          else
            cat > "$RUNNER_TEMP/build-input/product.json" <<'JSON'
          {
            "schema": "jarvis.product-client.v1",
            "api_base_url": "https://product.example.test",
            "allow_insecure_localhost": false,
            "entitlement_public_keys": {"entitlement-ci-key": "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"},
            "release_public_keys": {"release-ci-key": "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"}
          }
          JSON
          fi
      - name: Build app + DMG + manifest + verify + smoke
        env:
          JARVIS_BUILD_PYTHON: ${{ runner.temp }}/build-venv/bin/python
          JARVIS_TARGET_ARCH: arm64
          JARVIS_OUTPUT_ROOT: ${{ runner.temp }}/local-release
          JARVIS_PRODUCT_CONFIG: ${{ runner.temp }}/build-input/product.json
        run: |
          # Optional provisional icon (macOS-only, development use).
          export JARVIS_APP_ICON="$(bash packaging/macos/make_icns.sh || true)"
          bash packaging/macos/clean.sh
          bash packaging/macos/build_app.sh
          bash packaging/macos/build_dmg.sh
          bash packaging/macos/generate_manifest.sh
          bash packaging/macos/verify_app.sh
          bash packaging/macos/smoke_launch.sh
      - name: Locate artifacts
        id: locate
        env:
          JARVIS_TARGET_ARCH: arm64
          JARVIS_OUTPUT_ROOT: ${{ runner.temp }}/local-release
        run: |
          WS="$JARVIS_OUTPUT_ROOT/${JARVIS_BUILD_VERSION}+${JARVIS_BUILD_NUMBER}/macos-arm64"
          echo "workspace=$WS" >> "$GITHUB_OUTPUT"
      - name: Upload unsigned DMG + manifest
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-macos-unsigned
          path: |
            ${{ steps.locate.outputs.workspace }}/*.dmg
            ${{ steps.locate.outputs.workspace }}/build_manifest.json
          if-no-files-found: error
          retention-days: 7

  sign-notarize:
    needs: build-unsigned
    runs-on: macos-14
    # Runs only when the protected signing identity secret is configured.
    if: ${{ secrets.JARVIS_MACOS_SIGN_IDENTITY != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: jarvis-macos-unsigned
          path: ${{ runner.temp }}/artifact
      - name: Import Developer ID certificate into a temporary keychain
        env:
          CERT_P12_BASE64: ${{ secrets.JARVIS_MACOS_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.JARVIS_MACOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.JARVIS_MACOS_KEYCHAIN_PASSWORD }}
        run: |
          # Secrets are auto-masked in logs; do not print them and do not enable
          # shell tracing in this step.
          set +x
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          printf '%s' "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          rm -f "$RUNNER_TEMP/cert.p12"
      - name: Store notary credentials in the keychain profile
        env:
          NOTARY_PROFILE: ${{ secrets.JARVIS_MACOS_NOTARY_PROFILE }}
          NOTARY_APPLE_ID: ${{ secrets.JARVIS_MACOS_NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.JARVIS_MACOS_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.JARVIS_MACOS_NOTARY_PASSWORD }}
        run: |
          set +x
          xcrun notarytool store-credentials "$NOTARY_PROFILE" \
            --apple-id "$NOTARY_APPLE_ID" \
            --team-id "$NOTARY_TEAM_ID" \
            --password "$NOTARY_PASSWORD"
      - name: Sign, verify, notarize, staple
        env:
          JARVIS_MACOS_SIGN_IDENTITY: ${{ secrets.JARVIS_MACOS_SIGN_IDENTITY }}
          JARVIS_MACOS_TEAM_ID: ${{ secrets.JARVIS_MACOS_TEAM_ID }}
          JARVIS_MACOS_NOTARY_PROFILE: ${{ secrets.JARVIS_MACOS_NOTARY_PROFILE }}
          JARVIS_BUILD_PYTHON: ${{ runner.temp }}/build-venv/bin/python
          JARVIS_TARGET_ARCH: arm64
          JARVIS_OUTPUT_ROOT: ${{ runner.temp }}/local-release
        run: |
          # NOTE: a full signing run rebuilds the app in this job (the .app is not
          # a portable artifact). This step is the credential-gated entry point.
          echo "Developer ID signing credentials detected; running signed pipeline."
          bash packaging/macos/sign_artifact.sh --execute
