<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
  <title>JARVIS Dashboard</title>
  <meta name="theme-color" content="#07090f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="JARVIS">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <link rel="icon" href="/static/icon-192.png">
  <script src="/static/crypto.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #07090f;
      --surface: rgba(255,255,255,0.04);
      --border:  rgba(255,255,255,0.07);
      --accent:  #6366f1;
      --adim:    rgba(99,102,241,0.14);
      --text:    #dde3ed;
      --muted:   #5e6a7e;
      --green:   #22c55e;
      --gdim:    rgba(34,197,94,0.14);
    }
    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      flex-shrink: 0; display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      background: rgba(7,9,15,0.95);
    }
    .logo { font-size: 15px; font-weight: 700; letter-spacing: 6px; }
    .logo em { color: var(--accent); font-style: normal; }
    .pill {
      display: flex; align-items: center; gap: 6px; padding: 4px 11px;
      border-radius: 99px; background: var(--surface); border: 1px solid var(--border);
      font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--muted); transition: all 0.3s;
    }
    .pill.on { background: var(--gdim); border-color: rgba(34,197,94,0.3); color: var(--green); }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
    .pill.on .dot { background: var(--green); animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .spacer { flex: 1; }
    .enc-badge {
      font-size: 9px; font-weight: 700; letter-spacing: 1.5px; padding: 3px 8px;
      border-radius: 4px; display: none;
    }
    .enc-badge.on  { display: block; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.25); color: var(--green); }
    .enc-badge.off { display: block; background: rgba(255,100,100,0.08); border: 1px solid rgba(255,100,100,0.2); color: #f87171; }
    .url { font-size: 10px; font-family: monospace; color: var(--muted); padding: 4px 9px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; }

    /* ── FEED ── */
    main { flex: 1; overflow-y: auto; padding: 14px 16px 8px; display: flex; flex-direction: column; gap: 10px; }
    main::-webkit-scrollbar { width: 3px; }
    main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .msg { max-width: 82%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.55; animation: pop 0.18s ease; }
    @keyframes pop { from { opacity:0; transform:translateY(4px); } }
    .msg-j   { align-self:flex-start; background:var(--adim);   border:1px solid rgba(99,102,241,0.18); border-bottom-left-radius:4px; }
    .msg-u   { align-self:flex-end;   background:var(--surface); border:1px solid var(--border);        border-bottom-right-radius:4px; }
    .msg-sys { align-self:center; font-size:11px; color:var(--muted); padding:2px 0; background:transparent; border:none; letter-spacing:0.3px; }
    .lbl { font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; opacity:0.45; margin-bottom:4px; }
    .msg-j .lbl { color:var(--accent); }
    .msg-u .lbl { color:var(--muted); text-align:right; }

    /* ── SCREENSHOT MESSAGE ── */
    .msg-shot { align-self:flex-start; max-width:88%; padding:8px; background:var(--adim); border:1px solid rgba(99,102,241,0.18); border-radius:14px; border-bottom-left-radius:4px; animation:pop 0.18s ease; }
    .msg-shot .lbl { color:var(--accent); margin-bottom:6px; }
    .shot-img { display:block; width:100%; border-radius:9px; cursor:pointer; }

    /* ── FILE CARD ── */
    .msg-file {
      align-self: flex-end;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; border-bottom-right-radius: 4px;
      padding: 11px 14px; display: flex; align-items: center; gap: 12px;
      max-width: 82%; animation: pop 0.18s ease;
    }
    .fc-icon { font-size: 26px; flex-shrink: 0; }
    .fc-meta { flex: 1; min-width: 0; }
    .fc-lbl  { font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; opacity:0.45; color:var(--muted); margin-bottom:4px; }
    .fc-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fc-size { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .fc-bar-wrap { height: 3px; background: var(--border); border-radius: 2px; margin-top: 7px; overflow: hidden; }
    .fc-bar { height: 100%; width: 0%; background: var(--accent); border-radius: 2px; transition: width 0.12s linear; }
    .fc-status { font-size: 10px; font-weight: 700; letter-spacing: 1px; flex-shrink: 0; color: var(--muted); }
    .fc-status.done { color: var(--green); }
    .fc-status.err  { color: #f87171; }
    .fc-dl { display:block; margin-top:6px; font-size:11px; color:var(--accent); text-decoration:none; font-weight:600; }
    .fc-dl:hover { opacity: 0.8; }

    /* ── FOOTER ── */
    footer { flex-shrink:0; padding:10px 14px; border-top:1px solid var(--border); background:rgba(7,9,15,0.95); display:flex; gap:8px; align-items:center; }
    #inp { flex:1; padding:11px 14px; background:var(--surface); border:1.5px solid var(--border); border-radius:12px; color:var(--text); font-size:14px; outline:none; transition:border-color 0.15s; }
    #inp:focus { border-color: var(--accent); }
    #inp::placeholder { color: var(--muted); }
    .btn { padding:11px 15px; border:none; border-radius:12px; font-size:11px; font-weight:700; letter-spacing:1.5px; cursor:pointer; transition:opacity 0.15s,transform 0.1s; }
    .btn:active { transform: scale(0.96); }
    .btn:hover  { opacity: 0.82; }
    .btn-send { background: var(--accent); color: #fff; }
    .btn-wake { background:var(--surface); border:1px solid var(--border); color:var(--muted); display:none; }
    .btn-wake.show { display:block; color:var(--green); border-color:rgba(34,197,94,0.35); }
    .btn-attach {
      background: var(--surface); border: 1px solid var(--border); color: var(--muted);
      padding: 11px 13px; font-size: 16px; line-height: 1; border-radius: 12px;
      cursor: pointer; transition: opacity 0.15s, transform 0.1s; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0;
    }
    .btn-attach:hover  { opacity: 0.82; border-color: var(--accent); color: var(--accent); }
    .btn-attach:active { transform: scale(0.96); }

    /* ── MIC BUTTON ── */
    #mic-btn {
      background: var(--surface); border: 1px solid var(--border); color: var(--muted);
      padding: 11px 13px; font-size: 16px; line-height: 1; border-radius: 12px;
      cursor: pointer; transition: opacity 0.15s, transform 0.1s, background 0.2s, border-color 0.2s;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    #mic-btn:hover  { opacity: 0.82; border-color: var(--accent); color: var(--accent); }
    #mic-btn:active { transform: scale(0.96); }
    #mic-btn.recording {
      background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.45); color: #ef4444;
      animation: mic-pulse 1s ease-in-out infinite;
    }
    #mic-btn.unsupported { opacity: 0.3; cursor: not-allowed; }
    @keyframes mic-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.65;transform:scale(0.97)} }

    /* ── QUICK COMMANDS ── */
    #qbar {
      flex-shrink: 0; display: flex; gap: 7px; align-items: center;
      overflow-x: auto; overflow-y: hidden; padding: 8px 14px;
      border-top: 1px solid var(--border); background: rgba(7,9,15,0.95);
      scrollbar-width: none; -webkit-overflow-scrolling: touch;
    }
    #qbar::-webkit-scrollbar { display: none; }
    .qchip {
      flex-shrink: 0; padding: 7px 13px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 99px; color: var(--text);
      font-size: 12.5px; white-space: nowrap; cursor: pointer; user-select: none;
      transition: background 0.15s, border-color 0.15s, transform 0.1s, color 0.15s;
    }
    .qchip:active { transform: scale(0.95); }
    .qchip-cmd:hover { border-color: var(--accent); }
    .qchip-add  { color: var(--accent); border-color: rgba(99,102,241,0.35); font-weight: 700; }
    .qchip-edit { color: var(--muted); }
    #qbar.editing .qchip-cmd { color: #f87171; border-color: rgba(239,68,68,0.4); }
    #qbar.editing .qchip-edit { color: var(--green); border-color: rgba(34,197,94,0.35); }

    /* ── UNLUMEN-INSPIRED ACCENTS (glow badge + glow button + shimmer) ── */
    .pill.on { box-shadow: 0 0 14px rgba(34,197,94,0.32); }
    .pill.reconnecting { color: var(--accent); border-color: rgba(99,102,241,0.3); }
    .pill.reconnecting .dot { background: var(--accent); animation: blink 1s infinite; }
    .btn-send { box-shadow: 0 3px 14px rgba(99,102,241,0.35); }
    .btn-send:hover { box-shadow: 0 5px 22px rgba(99,102,241,0.55); }

    /* ── MACRO BUILDER BOTTOM SHEET ── */
    .sheet-back {
      position: fixed; inset: 0; z-index: 50; display: flex;
      align-items: flex-end; justify-content: center;
      background: rgba(3,5,10,0.62); -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px);
      opacity: 0; transition: opacity 0.22s ease;
    }
    .sheet-back.show { opacity: 1; }
    .sheet {
      width: 100%; max-width: 520px; background: #0c0f17; border: 1px solid var(--border);
      border-radius: 20px 20px 0 0; padding: 20px 18px calc(20px + env(safe-area-inset-bottom));
      transform: translateY(100%); transition: transform 0.26s cubic-bezier(.2,.9,.3,1);
      max-height: 82vh; display: flex; flex-direction: column;
    }
    .sheet-back.show .sheet { transform: translateY(0); }
    .sheet-title { font-size: 15px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 12px; color: var(--accent); }
    .sheet-name {
      width: 100%; padding: 11px 14px; background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 12px; color: var(--text); font-size: 14px; outline: none; margin-bottom: 12px;
    }
    .sheet-name:focus { border-color: var(--accent); }
    .sheet-hint { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
    .sheet-caps { display: flex; flex-wrap: wrap; gap: 8px; overflow-y: auto; padding-bottom: 6px; }
    .cap-chip {
      padding: 9px 14px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text); font-size: 13px; cursor: pointer;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s, transform 0.1s;
    }
    .cap-chip:active { transform: scale(0.96); }
    .cap-chip.on {
      color: #fff; background: var(--adim); border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent), 0 4px 14px rgba(99,102,241,0.28);
    }
    .sheet-actions { display: flex; gap: 10px; margin-top: 16px; }
    .sheet-btn {
      flex: 1; padding: 13px; border: none; border-radius: 12px; font-size: 12px; font-weight: 700;
      letter-spacing: 1px; cursor: pointer; transition: opacity 0.15s, transform 0.1s;
    }
    .sheet-btn:active { transform: scale(0.97); }
    .sheet-cancel { background: var(--surface); border: 1px solid var(--border); color: var(--muted); }
    .sheet-save { background: var(--accent); color: #fff; box-shadow: 0 4px 18px rgba(99,102,241,0.4); }

    /* ── SETTINGS (gear + rows + toggle) ── */
    .hdr-btn {
      flex-shrink: 0; width: 34px; height: 34px; border-radius: 10px;
      background: var(--surface); border: 1px solid var(--border); color: var(--muted);
      font-size: 16px; line-height: 1; cursor: pointer; display: flex;
      align-items: center; justify-content: center; transition: color 0.15s, border-color 0.15s, transform 0.3s;
    }
    .hdr-btn:hover { color: var(--accent); border-color: var(--accent); }
    .hdr-btn:active { transform: rotate(45deg); }
    .set-row {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: 14px 2px; border-bottom: 1px solid var(--border); font-size: 14px; color: var(--text);
    }
    .set-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .lang-opts { display: flex; gap: 6px; }
    .lang-btn {
      padding: 7px 11px; border-radius: 9px; background: var(--surface);
      border: 1px solid var(--border); color: var(--muted); font-size: 12px;
      cursor: pointer; transition: all 0.15s;
    }
    .lang-btn.on { color: #fff; background: var(--adim); border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
    /* Unlumen-style switch */
    .toggle {
      flex-shrink: 0; width: 46px; height: 27px; border-radius: 99px; position: relative;
      background: var(--surface); border: 1px solid var(--border); cursor: pointer; transition: background 0.2s, border-color 0.2s;
    }
    .toggle .knob {
      position: absolute; top: 2px; left: 2px; width: 21px; height: 21px; border-radius: 50%;
      background: var(--muted); transition: transform 0.22s cubic-bezier(.3,.9,.3,1), background 0.2s;
    }
    .toggle.on { background: var(--gdim); border-color: rgba(34,197,94,0.5); }
    .toggle.on .knob { transform: translateX(19px); background: var(--green); }

    /* ── TOAST ── */
    #toast {
      position:fixed; top:66px; left:50%; transform:translateX(-50%) translateY(-8px);
      background:rgba(34,197,94,0.16); border:1px solid rgba(34,197,94,0.4);
      color:var(--green); font-size:12px; font-weight:700; letter-spacing:1px;
      padding:7px 18px; border-radius:99px;
      opacity:0; transition:opacity 0.22s,transform 0.22s;
      pointer-events:none; white-space:nowrap;
    }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* ═══════════════════════════════════════════════════════════════════
       MOBILE FIT + UNLUMEN-INSPIRED SKIN  (2026-07-12)
       Layout: dynamic viewport height + safe-area insets so the footer,
       header and quick-bar never run off a notched phone screen.
       Visuals: glass surfaces, gradient accent, glow, shimmer and spring
       motion — Unlumen used as animation reference only (web/PWA); no
       desktop hover/cursor/magnetic effects are forced onto touch.
       ═══════════════════════════════════════════════════════════════════ */

    /* ── Dynamic viewport: fill the *visible* area, not the layout viewport,
          so the input row stays on-screen when the mobile URL bar shows ── */
    body {
      height: 100vh;      /* fallback for older browsers */
      height: 100dvh;
      background:
        radial-gradient(125% 80% at 50% -12%, rgba(99,102,241,0.16), transparent 60%),
        var(--bg);
    }

    /* ── Safe-area insets (notch, home indicator, rounded corners) ── */
    header {
      padding-top: calc(12px + env(safe-area-inset-top));
      padding-left: calc(16px + env(safe-area-inset-left));
      padding-right: calc(16px + env(safe-area-inset-right));
      background: linear-gradient(180deg, rgba(11,14,22,0.92), rgba(7,9,15,0.72));
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      backdrop-filter: blur(20px) saturate(160%);
    }
    main {
      padding-left: calc(16px + env(safe-area-inset-left));
      padding-right: calc(16px + env(safe-area-inset-right));
      overscroll-behavior: contain;
    }
    #qbar {
      padding-left: calc(14px + env(safe-area-inset-left));
      padding-right: calc(14px + env(safe-area-inset-right));
      background: rgba(7,9,15,0.72);
      -webkit-backdrop-filter: blur(18px); backdrop-filter: blur(18px);
    }
    footer {
      padding-left: calc(14px + env(safe-area-inset-left));
      padding-right: calc(14px + env(safe-area-inset-right));
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
      background: linear-gradient(0deg, rgba(11,14,22,0.94), rgba(7,9,15,0.74));
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      backdrop-filter: blur(20px) saturate(160%);
    }

    /* ── Header stays on one row: a long tunnel URL truncates with an
          ellipsis instead of pushing the header off the screen edge ── */
    .logo { flex-shrink: 0; }
    .url {
      flex-shrink: 1; min-width: 0; max-width: 42vw;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ── Shimmering wordmark (Unlumen “Shimmering Text” reference) ── */
    .logo {
      background: linear-gradient(100deg, #aeb6c6 22%, #ffffff 50%, #aeb6c6 78%);
      background-size: 220% 100%;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; color: transparent;
      animation: logo-shimmer 7s linear infinite;
    }
    .logo em {
      -webkit-text-fill-color: var(--accent); color: var(--accent);
      text-shadow: 0 0 14px rgba(99,102,241,0.6);
    }
    @keyframes logo-shimmer { to { background-position: 220% 0; } }

    /* ── Status pill: glowing badge (Unlumen “Glowing Badge”) ── */
    .pill { -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px); }
    .pill.on { box-shadow: 0 0 0 1px rgba(34,197,94,0.25), 0 0 18px rgba(34,197,94,0.35); }

    /* ── Message bubbles: spring reveal + softer glass ── */
    .msg { animation: msg-in 0.32s cubic-bezier(.34,1.4,.5,1); }
    @keyframes msg-in { from { opacity: 0; transform: translateY(8px) scale(0.98); } }
    .msg-j { background: linear-gradient(180deg, rgba(99,102,241,0.20), rgba(99,102,241,0.10)); }

    /* ── Inputs / buttons: spring press + accent glow (Unlumen “Glow Button”) ── */
    #inp { transition: border-color .18s, box-shadow .18s, background .18s; }
    #inp:focus { box-shadow: 0 0 0 3px rgba(99,102,241,0.16); background: rgba(99,102,241,0.06); }
    .btn, .btn-attach, #mic-btn {
      transition: transform .12s cubic-bezier(.34,1.56,.64,1), opacity .15s,
                  border-color .2s, color .2s, box-shadow .2s;
    }
    .btn-send {
      background: linear-gradient(135deg, #7c7ff6, #5b5ef0);
      box-shadow: 0 4px 18px rgba(99,102,241,0.45);
    }
    .btn-send:active { box-shadow: 0 2px 10px rgba(99,102,241,0.4); }

    /* ── Quick chips: subtle spring press ── */
    .qchip {
      transition: background .15s, border-color .15s, color .15s,
                  transform .12s cubic-bezier(.34,1.56,.64,1);
    }

    /* ── Respect users who ask for less motion ── */
    @media (prefers-reduced-motion: reduce) {
      .logo { animation: none; }
      .msg  { animation: none; }
      .pill.on .dot { animation: none; }
      #mic-btn.recording { animation: none; }
    }
  </style>
</head>
<body>
  <div id="toast"></div>
  <header>
    <div class="logo"><em>J</em>ARVIS</div>
    <div class="pill" id="pill"><span class="dot"></span><span id="st" data-i18n="st.connecting">Connecting</span></div>
    <div class="enc-badge" id="enc">AES-256</div>
    <div class="spacer"></div>
    <button id="set-btn" class="hdr-btn" onclick="openSettings()" title="Settings" aria-label="Settings">⚙</button>
  </header>
  <main id="feed"></main>
  <div id="qbar"></div>
  <footer>
    <input id="inp" placeholder="Send a command to JARVIS…" autocomplete="off">
    <label class="btn-attach" for="file-inp" title="Send file">📎</label>
    <input type="file" id="file-inp" multiple accept="*/*" style="display:none">
    <button id="mic-btn" onclick="doMic()" title="Voice command">🎤</button>
    <button class="btn btn-wake" id="wake" onclick="doWake()" data-i18n="btn.wake">WAKE</button>
    <button class="btn btn-send" onclick="doSend()" data-i18n="btn.send">SEND</button>
  </footer>

  <!-- Settings bottom sheet -->
  <div class="sheet-back" id="set-sheet">
    <div class="sheet">
      <div class="sheet-title" data-i18n="settings.title">Sozlamalar</div>
      <div class="set-row">
        <span data-i18n="settings.language">Til</span>
        <div class="lang-opts">
          <button class="lang-btn" data-lang="uz" onclick="setLang('uz')">O‘zbek</button>
          <button class="lang-btn" data-lang="ru" onclick="setLang('ru')">Русский</button>
          <button class="lang-btn" data-lang="en" onclick="setLang('en')">English</button>
        </div>
      </div>
      <div class="set-row">
        <div><div data-i18n="settings.voice">Ovozli javob</div><div class="set-sub" data-i18n="settings.voice_sub">Javob telefonda ovoz bilan o‘qiladi</div></div>
        <button class="toggle" id="voice-toggle" onclick="toggleVoice()" aria-label="Voice reply"><span class="knob"></span></button>
      </div>
      <button class="sheet-btn sheet-cancel" onclick="closeSettings()" data-i18n="settings.close">Yopish</button>
    </div>
  </div>

  <script>
    // ── Auth — bearer token (mutable: auto-reconnect can refresh it) ──────────
    let _authToken  = sessionStorage.getItem('jarvis_token');
    let _sessionKey = sessionStorage.getItem('jarvis_key');

    if (!_authToken) {
      location.replace('/login');
    }

    // ── i18n (uz / ru / en) — one consistent language, default Uzbek ──────────
    const _I18N = {
      uz: {

        'sys.active':'Удалённая сессия активна.','sys.reconnecting':'Переподключение… (Mac мог уснуть)','sys.reconnected':'Переподключено к JARVIS.','sys.expired':'Сессия истекла — возврат ко входу…','sys.wake':'Сигнал пробуждения отправлен…',

      },
      en: {
        'st.connecting':'Connecting','st.active':'Active','st.sleeping':'Sleeping','st.reconnecting':'Reconnecting',
        'inp.placeholder':'Send a command to JARVIS…','btn.send':'SEND','btn.wake':'WAKE',
        'settings.title':'Settings','settings.language':'Language','settings.voice':'Voice reply','settings.voice_sub':'The reply is read aloud on the phone','settings.close':'Close',
        'sys.active':'Remote session active.','sys.reconnecting':'Reconnecting… (Mac may be asleep)','sys.reconnected':'Reconnected to JARVIS.','sys.expired':'Session expired — returning to login…','sys.wake':'Wake signal sent…',
        'toast.connected':'Connected to JARVIS','toast.reconnected':'Reconnected'
      }
    };
    let _lang = localStorage.getItem('jarvis_lang') || 'uz';
    let _lastStatus = '';
    function t(k) { return (_I18N[_lang] && _I18N[_lang][k]) || _I18N.en[k] || k; }
    function applyLang() {
      document.documentElement.lang = _lang;
      document.querySelectorAll('[data-i18n]').forEach(function (el) {
        el.textContent = t(el.getAttribute('data-i18n'));
      });
      var inp = document.getElementById('inp'); if (inp) inp.placeholder = t('inp.placeholder');
      document.querySelectorAll('.lang-btn').forEach(function (b) {
        b.classList.toggle('on', b.dataset.lang === _lang);
      });
      if (_lastStatus) { try { setStatus(_lastStatus); } catch (_) {} }
    }
    function setLang(l) { _lang = l; localStorage.setItem('jarvis_lang', l); applyLang(); }

    // ── Settings bottom sheet ─────────────────────────────────────────────────
    function openSettings() { document.getElementById('set-sheet').classList.add('show'); }
    function closeSettings() { document.getElementById('set-sheet').classList.remove('show'); }
    document.getElementById('set-sheet').addEventListener('click', function (e) {
      if (e.target.id === 'set-sheet') closeSettings();
    });

    // ── Voice reply — phone text-to-speech of JARVIS's replies ────────────────
    let _voiceReply = localStorage.getItem('jarvis_voice_reply') === '1';
    function updateVoiceToggle() {
      var tg = document.getElementById('voice-toggle'); if (tg) tg.classList.toggle('on', _voiceReply);
    }
    function toggleVoice() {
      _voiceReply = !_voiceReply;
      localStorage.setItem('jarvis_voice_reply', _voiceReply ? '1' : '0');
      updateVoiceToggle();
      if (!_voiceReply && 'speechSynthesis' in window) { try { speechSynthesis.cancel(); } catch (_) {} }
    }
    function _speak(text) {
      if (!_voiceReply || !text || !('speechSynthesis' in window)) return;
      try {
        var u = new SpeechSynthesisUtterance(text);
        u.lang = _lang === 'ru' ? 'ru-RU' : (_lang === 'en' ? 'en-US' : 'uz-UZ');
        speechSynthesis.cancel();
        speechSynthesis.speak(u);
      } catch (_) {}
    }
    applyLang();
    updateVoiceToggle();

    function _authHeader() { return { 'Authorization': `Bearer ${_authToken}` }; }
    function _authFetch(url, opts = {}) {
      opts.headers = Object.assign({}, opts.headers, _authHeader());
      return fetch(url, opts);
    }

    // ── AES-256-CBC encryption (CryptoJS) ────────────────────────────────────
    const _AES_SALT = 'JARVIS-DASHBOARD-v1';
    let _aesKey = null;

    function _initCrypto(key) {
      if (typeof CryptoJS === 'undefined') return false;
      _aesKey = CryptoJS.SHA256(key + _AES_SALT);
      return true;
    }

    function _encrypt(plaintext) {
      if (!_aesKey || typeof CryptoJS === 'undefined') return null;
      try {
        const iv  = CryptoJS.lib.WordArray.random(16);
        const enc = CryptoJS.AES.encrypt(
          CryptoJS.enc.Utf8.parse(plaintext), _aesKey,
          { iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 }
        );
        const ivHex = iv.toString(CryptoJS.enc.Hex);
        const ctHex = enc.ciphertext.toString(CryptoJS.enc.Hex);
        const hex   = ivHex + ctHex;
        const bytes = new Uint8Array(hex.length / 2);
        for (let i = 0; i < bytes.length; i++)
          bytes[i] = parseInt(hex.substr(i * 2, 2), 16);
        return btoa(String.fromCharCode(...bytes));
      } catch { return null; }
    }

    const _encReady = _sessionKey ? _initCrypto(_sessionKey) : false;
    const encBadge  = document.getElementById('enc');
    if (_encReady) { encBadge.className = 'enc-badge on'; }
    else           { encBadge.className = 'enc-badge off'; encBadge.textContent = 'NO ENC'; }

    // ── WebSocket ─────────────────────────────────────────────────────────────
    const feed  = document.getElementById('feed');
    const pill  = document.getElementById('pill');
    const stTxt = document.getElementById('st');
    const wake  = document.getElementById('wake');

    // Auto-reconnecting socket — survives Mac sleep/wake without kicking the phone
    // back to the login screen. On sleep the server is unreachable (close 1006);
    // we keep retrying quietly. If the JARVIS process fully restarted, the token is
    // rejected (close 4001) and we mint a fresh one from the paired device token.
    let   ws               = null;
    let   _reconnectDelay  = 1000;
    const _RECONNECT_MIN   = 1000;
    const _RECONNECT_MAX   = 15000;
    let   _wasConnected    = false;
    let   _reconnectTimer  = null;

    function _buildWsUrl() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      return `${proto}://${location.host}/ws?token=${encodeURIComponent(_authToken)}`;
    }

    async function _refreshTokenViaDevice() {
      const devTok = localStorage.getItem('jarvis_device_token');
      if (!devTok) return false;
      try {
        const r = await fetch('/api/device-login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ device_token: devTok }),
        });
        const d = await r.json();
        if (d.ok && d.token) {
          _authToken = d.token;
          sessionStorage.setItem('jarvis_token', d.token);
          if (d.key) {
            _sessionKey = d.key;
            sessionStorage.setItem('jarvis_key', d.key);
            _initCrypto(d.key);
          }
          return true;
        }
      } catch (_) {}
      return false;
    }

    function connectWS() {
      if (_reconnectTimer) { clearTimeout(_reconnectTimer); _reconnectTimer = null; }
      try { ws = new WebSocket(_buildWsUrl()); }
      catch (_) { _scheduleReconnect(); return; }

      ws.onopen = () => {
        _reconnectDelay = _RECONNECT_MIN;
        if (_wasConnected) { setStatus('active'); sys(t('sys.reconnected')); toast(t('toast.reconnected')); }
        else               { sys(t('sys.active')); toast(t('toast.connected')); }
        _wasConnected = true;
      };
      ws.onerror = () => { /* onclose fires next — handle there */ };
      ws.onclose = (ev) => { _onWsClosed(ev); };
      ws.onmessage = (e) => {
        const m = JSON.parse(e.data);
        if (m.type === 'log')           append(m.speaker, m.text);
        if (m.type === 'status')        setStatus(m.state);
        if (m.type === 'wake')          sys('Wake word detected — connecting…');
        if (m.type === 'sys')           sys(m.text);
        if (m.type === 'file_received') _onFileReceived(m);
        if (m.type === 'screenshot')    _onScreenshot(m);
      };
    }

    async function _onWsClosed(ev) {
      // 4001 = token rejected (process restarted) → refresh from paired device token
      if (ev && ev.code === 4001) {
        const ok = await _refreshTokenViaDevice();
        if (!ok) { sys(t('sys.expired')); location.replace('/login'); return; }
      }
      pill.className = 'pill reconnecting'; stTxt.textContent = t('st.reconnecting');
      if (_wasConnected) sys(t('sys.reconnecting'));
      _scheduleReconnect();
    }

    function _scheduleReconnect() {
      if (_reconnectTimer) return;
      const delay = _reconnectDelay;
      _reconnectTimer = setTimeout(async () => {
        _reconnectTimer = null;
        // After a few tries, proactively refresh the token in case the server restarted
        if (delay >= 8000) { await _refreshTokenViaDevice(); }
        connectWS();
      }, delay);
      _reconnectDelay = Math.min(Math.round(_reconnectDelay * 1.6), _RECONNECT_MAX);
    }

    // Wake from OS sleep / tab foreground → try to reconnect immediately
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && (!ws || ws.readyState > 1)) {
        _reconnectDelay = _RECONNECT_MIN;
        connectWS();
      }
    });

    connectWS();

    function setStatus(s) {
      _lastStatus = s;
      if (s === 'active') {
        pill.className = 'pill on'; stTxt.textContent = t('st.active'); wake.classList.remove('show');
      } else {
        pill.className = 'pill'; stTxt.textContent = t('st.sleeping'); wake.classList.add('show');
      }
    }

    function append(speaker, text) {
      const d = document.createElement('div');
      if (speaker === 'jarvis') {
        d.className = 'msg msg-j';
        d.innerHTML = `<div class="lbl">Jarvis</div>${esc(text)}`;
        _speak(text);
      } else {
        d.className = 'msg msg-u';
        d.innerHTML = `<div class="lbl">You</div>${esc(text)}`;
      }
      feed.appendChild(d);
      feed.scrollTop = feed.scrollHeight;
    }

    function sys(text) {
      const d = document.createElement('div');
      d.className = 'msg msg-sys'; d.textContent = text;
      feed.appendChild(d); feed.scrollTop = feed.scrollHeight;
    }

    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── File helpers ──────────────────────────────────────────────────────────
    function _fileIcon(name) {
      const ext = (name.split('.').pop() || '').toLowerCase();
      if (['jpg','jpeg','png','gif','webp','heic','heif','avif','bmp','svg'].includes(ext)) return '🖼️';
      if (['mp4','mov','avi','mkv','webm','m4v','3gp'].includes(ext))                       return '🎬';
      if (['mp3','m4a','wav','flac','aac','ogg','opus'].includes(ext))                      return '🎵';
      if (['pdf'].includes(ext))                                                             return '📋';
      if (['doc','docx','txt','md','rtf','odt'].includes(ext))                              return '📝';
      if (['xls','xlsx','csv','ods'].includes(ext))                                         return '📊';
      if (['ppt','pptx','odp'].includes(ext))                                               return '📑';
      if (['zip','rar','7z','tar','gz','bz2','xz'].includes(ext))                          return '📦';
      if (['apk','exe','dmg','deb','rpm','msi'].includes(ext))                              return '⚙️';
      return '📎';
    }

    function _fmtSize(bytes) {
      if (bytes < 1024)             return bytes + ' B';
      if (bytes < 1024 * 1024)     return (bytes / 1024).toFixed(1) + ' KB';
      if (bytes < 1024 ** 3)       return (bytes / 1024 / 1024).toFixed(1) + ' MB';
      return (bytes / 1024 ** 3).toFixed(2) + ' GB';
    }

    // ── File upload (phone → computer) ────────────────────────────────────────
    function _uploadFile(file) {
      const id = 'fc_' + Date.now() + '_' + Math.random().toString(36).slice(2);

      // Create file card in feed
      const card = document.createElement('div');
      card.className = 'msg-file';
      card.id = id;
      card.innerHTML = `
        <div class="fc-icon">${_fileIcon(file.name)}</div>
        <div class="fc-meta">
          <div class="fc-lbl">Sending</div>
          <div class="fc-name">${esc(file.name)}</div>
          <div class="fc-size">${_fmtSize(file.size)}</div>
          <div class="fc-bar-wrap"><div class="fc-bar" id="${id}_bar"></div></div>
        </div>
        <div class="fc-status" id="${id}_st">0%</div>
      `;
      feed.appendChild(card);
      feed.scrollTop = feed.scrollHeight;

      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/upload');
      xhr.setRequestHeader('Authorization', `Bearer ${_authToken}`);

      xhr.upload.onprogress = (e) => {
        if (!e.lengthComputable) return;
        const pct = Math.round(e.loaded / e.total * 100);
        const bar = document.getElementById(`${id}_bar`);
        const st  = document.getElementById(`${id}_st`);
        if (bar) bar.style.width = pct + '%';
        if (st)  st.textContent  = pct + '%';
      };

      xhr.onload = () => {
        const bar  = document.getElementById(`${id}_bar`);
        const st   = document.getElementById(`${id}_st`);
        const meta = card.querySelector('.fc-meta');
        const lbl  = card.querySelector('.fc-lbl');
        if (xhr.status === 200) {
          let savedName = file.name;
          try { savedName = JSON.parse(xhr.responseText).name || file.name; } catch {}
          const dlUrl = `/uploads/${encodeURIComponent(savedName)}?token=${encodeURIComponent(_authToken)}`;
          if (bar)  { bar.style.width = '100%'; bar.style.background = 'var(--green)'; }
          if (st)   { st.textContent = '✓'; st.className = 'fc-status done'; }
          if (lbl)  lbl.textContent = 'Sent';
          if (meta) meta.insertAdjacentHTML('beforeend',
            `<a class="fc-dl" href="${dlUrl}" download="${esc(savedName)}">⬇ Download back</a>`);
          toast('File sent!');
        } else {
          let errMsg = 'Upload failed';
          try { errMsg = JSON.parse(xhr.responseText).error || errMsg; } catch {}
          if (bar) bar.style.background = '#f87171';
          if (st)  { st.textContent = 'ERR'; st.className = 'fc-status err'; }
          if (lbl) lbl.textContent = errMsg;
        }
      };

      xhr.onerror = () => {
        const st  = document.getElementById(`${id}_st`);
        const lbl = card.querySelector('.fc-lbl');
        if (st)  { st.textContent = 'ERR'; st.className = 'fc-status err'; }
        if (lbl) lbl.textContent = 'Connection error';
      };

      const fd = new FormData();
      fd.append('file', file);
      xhr.send(fd);
    }

    // File received by another WebSocket client (e.g., second open tab)
    function _onFileReceived(m) {
      const dlUrl = `/uploads/${encodeURIComponent(m.name)}?token=${encodeURIComponent(_authToken)}`;
      const card  = document.createElement('div');
      card.className = 'msg-file';
      card.innerHTML = `
        <div class="fc-icon">${_fileIcon(m.name)}</div>
        <div class="fc-meta">
          <div class="fc-lbl">Received</div>
          <div class="fc-name">${esc(m.name)}</div>
          <div class="fc-size">${_fmtSize(m.size)}</div>
          <a class="fc-dl" href="${dlUrl}" download="${esc(m.name)}">⬇ Download</a>
        </div>
        <div class="fc-status done">✓</div>
      `;
      feed.appendChild(card);
      feed.scrollTop = feed.scrollHeight;
      toast('File received on computer!');
    }

    // Screenshot of the Mac screen after a remote command — tap to view full size
    function _onScreenshot(m) {
      if (!m.data) return;
      const card = document.createElement('div');
      card.className = 'msg msg-shot';
      card.innerHTML =
        '<div class="lbl">Screen</div>' +
        '<img class="shot-img" src="' + m.data + '" alt="Mac screen" ' +
        'onclick="window.open(this.src)">';
      feed.appendChild(card);
      feed.scrollTop = feed.scrollHeight;
    }

    // File input change handler
    document.getElementById('file-inp').addEventListener('change', function () {
      Array.from(this.files).forEach(_uploadFile);
      this.value = ''; // reset so the same file can be re-sent
    });

    // ── Commands ──────────────────────────────────────────────────────────────
    function _sendText(txt) {
      const t = (txt || '').trim();
      if (!t) return;
      append('user', t);
      const enc  = _encrypt(t);
      const body = enc ? { enc } : { text: t };
      _authFetch('/api/command', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
    }

    function doSend() {
      const inp = document.getElementById('inp');
      const txt = inp.value.trim();
      if (!txt) return;
      inp.value = '';
      _sendText(txt);
    }

    function doWake() {
      sys('Sending wake signal…');
      _authFetch('/api/wake', { method: 'POST' });
    }

    document.getElementById('inp').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
    });

    // ── Quick commands / macros (above keyboard) ──────────────────────────────
    // Commands are built from JARVIS's own capabilities — one tap runs several
    // actions, no retyping. Stored on the computer (/api/macros) and shared with
    // the desktop, so a command added on the phone also works there.
    const qbar    = document.getElementById('qbar');
    let   _caps    = [];    // [{id,label,phrase,needs_input,input_label}]
    let   _macros  = [];    // [{id,name,steps,phrase}]
    let   _qEditing = false;

    async function _loadCaps() {
      try {
        const r = await _authFetch('/api/capabilities');
        const d = await r.json();
        if (Array.isArray(d.capabilities)) _caps = d.capabilities;
      } catch (_) {}
    }
    async function _loadMacros() {
      try {
        const r = await _authFetch('/api/macros');
        const d = await r.json();
        if (Array.isArray(d.macros)) _macros = d.macros;
      } catch (_) {}
      _renderQuick();
    }
    async function _saveMacros() {
      try {
        const r = await _authFetch('/api/macros', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ macros: _macros }),
        });
        const d = await r.json();
        if (d.ok && Array.isArray(d.macros)) _macros = d.macros;
      } catch (_) {}
    }

    function _renderQuick() {
      qbar.className = _qEditing ? 'editing' : '';
      qbar.innerHTML = '';
      _macros.forEach((m, i) => {
        const b = document.createElement('button');
        b.className   = 'qchip qchip-cmd';
        b.textContent = _qEditing ? (m.name + '  ✕') : m.name;
        b.title       = _qEditing ? 'Tap to remove' : (m.phrase || m.name);
        b.onclick     = async () => {
          if (_qEditing) { _macros.splice(i, 1); await _saveMacros(); _renderQuick(); }
          else           { _sendText(m.phrase || m.name); }
        };
        qbar.appendChild(b);
      });
      const add = document.createElement('button');
      add.className   = 'qchip qchip-add';
      add.textContent = '＋';
      add.title       = 'Add command';
      add.onclick     = _openBuilder;
      qbar.appendChild(add);
      const edit = document.createElement('button');
      edit.className   = 'qchip qchip-edit';
      edit.textContent = _qEditing ? '✓' : '✎';
      edit.title       = _qEditing ? 'Done' : 'Edit commands';
      edit.onclick     = () => { _qEditing = !_qEditing; _renderQuick(); };
      qbar.appendChild(edit);
    }

    // ── Macro builder (capability picker) ─────────────────────────────────────
    function _openBuilder() {
      if (!_caps.length) { toast('No capabilities loaded'); return; }
      const picked = {};   // id -> value

      const back = document.createElement('div');
      back.className = 'sheet-back';
      const sheet = document.createElement('div');
      sheet.className = 'sheet';
      sheet.innerHTML = `
        <div class="sheet-title">New command</div>
        <input class="sheet-name" id="mb-name" placeholder="Command name" autocomplete="off">
        <div class="sheet-hint">Pick actions JARVIS will run:</div>
        <div class="sheet-caps" id="mb-caps"></div>
        <div class="sheet-actions">
          <button class="sheet-btn sheet-cancel" id="mb-cancel">CANCEL</button>
          <button class="sheet-btn sheet-save" id="mb-save">SAVE</button>
        </div>`;
      back.appendChild(sheet);
      document.body.appendChild(back);
      requestAnimationFrame(() => back.classList.add('show'));

      const capBox = sheet.querySelector('#mb-caps');
      _caps.forEach(cap => {
        const chip = document.createElement('button');
        chip.className = 'cap-chip';
        chip.textContent = cap.label;
        chip.onclick = () => {
          if (chip.classList.toggle('on')) {
            let val = '';
            if (cap.needs_input) {
              val = (prompt(cap.input_label || cap.label) || '').trim();
            }
            picked[cap.id] = val;
          } else {
            delete picked[cap.id];
          }
        };
        capBox.appendChild(chip);
      });

      const close = () => { back.classList.remove('show'); setTimeout(() => back.remove(), 220); };
      sheet.querySelector('#mb-cancel').onclick = close;
      back.onclick = (e) => { if (e.target === back) close(); };
      sheet.querySelector('#mb-save').onclick = async () => {
        const name = sheet.querySelector('#mb-name').value.trim();
        const ids  = Object.keys(picked);
        if (!name || !ids.length) { toast('Name + at least one action'); return; }
        const steps = ids.map(id => ({ id, value: picked[id] || '' }));
        _macros.push({ name, steps });
        await _saveMacros();
        _renderQuick();
        close();
        toast('Command added');
      };
    }

    _loadCaps().then(_loadMacros);

    // ── Toast ─────────────────────────────────────────────────────────────────
    let _toastTimer;
    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
    }

    // ── Real-time Voice — PCM16 WebSocket → Gemini Live ──────────────────────
    const micBtn  = document.getElementById('mic-btn');
    let _voiceWs  = null;
    let _audioCtx = null;
    let _micStm   = null;
    let _audioNd  = null;

    function _micIdle() {
      micBtn.innerHTML = '🎤';
      micBtn.title     = 'Voice — tap to speak';
      micBtn.classList.remove('recording');
    }

    // Float32 PCM → resample to 16 kHz + convert to Int16
    function _f32toPcm16(f32, srcRate) {
      let s = f32;
      if (srcRate !== 16000) {
        const ratio = srcRate / 16000;
        const len   = Math.round(f32.length / ratio);
        s = new Float32Array(len);
        for (let i = 0; i < len; i++)
          s[i] = f32[Math.min(Math.round(i * ratio), f32.length - 1)];
      }
      const out = new Int16Array(s.length);
      for (let i = 0; i < s.length; i++)
        out[i] = Math.max(-32768, Math.min(32767, Math.round(s[i] * 32768)));
      return out.buffer;
    }

    function _showVoiceSetup() {
      if (document.getElementById('voice-setup')) return; // show once
      const origin = location.origin;
      const card = document.createElement('div');
      card.id = 'voice-setup';
      card.style.cssText = [
        'align-self:stretch', 'background:rgba(99,102,241,0.07)',
        'border:1px solid rgba(99,102,241,0.22)', 'border-radius:14px',
        'padding:16px 18px', 'font-size:13px', 'line-height:1.8',
        'animation:pop 0.18s ease'
      ].join(';');
      card.innerHTML =
        '<div style="font-weight:700;color:#818cf8;letter-spacing:.5px;margin-bottom:10px">🎤 One-time voice setup</div>' +
        '<ol style="padding-left:18px;color:#8899aa;margin:0;display:flex;flex-direction:column;gap:4px">' +
        '<li>Open a new tab → go to <span style="background:rgba(255,255,255,0.07);padding:1px 6px;border-radius:4px;font-family:monospace;font-size:12px">chrome://flags</span></li>' +
        '<li>Search: <strong style="color:#dde3ed">Insecure origins treated as secure</strong></li>' +
        '<li>Paste this URL into the box:<br><span id="flags-url" style="background:rgba(255,255,255,0.07);padding:2px 8px;border-radius:4px;font-family:monospace;font-size:11px;user-select:all;cursor:pointer">' + esc(origin) + '</span></li>' +
        '<li>Set to <strong style="color:#22c55e">Enabled</strong> → tap <strong style="color:#dde3ed">Relaunch</strong></li>' +
        '<li>Return here and tap 🎤</li>' +
        '</ol>';
      feed.appendChild(card);
      feed.scrollTop = feed.scrollHeight;
      // tap to copy
      card.querySelector('#flags-url').addEventListener('click', () => {
        navigator.clipboard?.writeText(origin).then(() => toast('URL copied!')).catch(() => {});
      });
    }

    async function doMic() {
      if (_voiceWs) { _stopVoice(); return; }

      if (!navigator.mediaDevices?.getUserMedia) {
        _showVoiceSetup();
        return;
      }
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true },
        });
      } catch (e) {
        sys(e.name === 'NotAllowedError'
          ? 'Microphone denied — tap the address bar lock and allow microphone.'
          : 'Mic error: ' + e.message);
        return;
      }

      // 16 kHz context (fall back to native rate — _f32toPcm16 resamples)
      let ctx;
      try { ctx = new AudioContext({ sampleRate: 16000 }); }
      catch (_) { ctx = new AudioContext(); }
      if (ctx.state === 'suspended') await ctx.resume();

      const wsProto = location.protocol === 'https:' ? 'wss' : 'ws';
      const ws = new WebSocket(
        `${wsProto}://${location.host}/ws/phone-audio?token=${encodeURIComponent(_authToken)}`
      );
      ws.binaryType = 'arraybuffer';

      ws.onopen = async () => {
        const rate = ctx.sampleRate;
        const src  = ctx.createMediaStreamSource(stream);

        // AudioWorklet (modern) — runs in dedicated audio thread
        const wCode = `class J extends AudioWorkletProcessor{process(i){const c=i[0]?.[0];if(c)this.port.postMessage(c.slice());return true;}}registerProcessor('j',J);`;
        try {
          const burl = URL.createObjectURL(new Blob([wCode], { type: 'application/javascript' }));
          await ctx.audioWorklet.addModule(burl);
          URL.revokeObjectURL(burl);
          const nd = new AudioWorkletNode(ctx, 'j');
          // Buffer to 1024 samples (64 ms at 16 kHz) before sending —
          // matches PC mic chunk size, prevents queue flooding on the server.
          let _pbuf = [], _plen = 0;
          nd.port.onmessage = e => {
            const chunk = new Int16Array(_f32toPcm16(e.data, rate));
            _pbuf.push(chunk); _plen += chunk.length;
            if (_plen >= 1024) {
              const out = new Int16Array(_plen); let off = 0;
              for (const c of _pbuf) { out.set(c, off); off += c.length; }
              if (ws.readyState === 1) ws.send(out.buffer);
              _pbuf = []; _plen = 0;
            }
          };
          src.connect(nd);
          _audioNd = nd;
        } catch (_) {
          // ScriptProcessor fallback (deprecated, still works everywhere)
          const sp = ctx.createScriptProcessor(4096, 1, 1);
          sp.onaudioprocess = e => {
            if (ws.readyState === 1) ws.send(_f32toPcm16(e.inputBuffer.getChannelData(0), rate));
          };
          src.connect(sp); sp.connect(ctx.destination);
          _audioNd = sp;
        }

        micBtn.innerHTML = '⏹';
        micBtn.title     = 'Tap to stop';
        micBtn.classList.add('recording');
        sys('Voice live — speak now');
        toast('🎤 Live');
      };

      ws.onclose = () => { _stopVoice(); };
      ws.onerror = () => { sys('Voice connection failed.'); _stopVoice(); };

      _voiceWs  = ws;
      _audioCtx = ctx;
      _micStm   = stream;
    }

    function _stopVoice() {
      if (_audioNd)  { try { _audioNd.disconnect(); }  catch (_) {}; _audioNd  = null; }
      if (_audioCtx) { try { _audioCtx.close(); }      catch (_) {}; _audioCtx = null; }
      if (_micStm)   { _micStm.getTracks().forEach(t => t.stop()); _micStm = null; }
      if (_voiceWs)  {
        const w = _voiceWs; _voiceWs = null;
        if (w.readyState < 2) w.close();
      }
      _micIdle();
    }

    // ── Exact-fit height (iOS Safari toolbar + keyboard) ──────────────────────
    // CSS 100dvh is the *largest* viewport, so when the Safari toolbar or the
    // keyboard appears the footer slides out of view. Pin the body to the real
    // visible height (visualViewport) so the input row is always on-screen.
    (function () {
      var vv = window.visualViewport;
      if (!vv) return;
      function fit() { document.body.style.height = vv.height + 'px'; }
      vv.addEventListener('resize', fit);
      vv.addEventListener('scroll', fit);
      window.addEventListener('orientationchange', function () { setTimeout(fit, 250); });
      fit();
    })();

    // ── PWA — install to home screen ──────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () =>
        navigator.serviceWorker.register('/sw.js').catch(() => {}));
    }
  </script>
</body>
