# JARVIS product backend — TLS reverse proxy (nginx).
#
# Terminates HTTPS, enforces the trusted host, applies an EDGE rate limit in
# addition to the app's in-process limits, forwards the real scheme/client, and
# optionally restricts the admin surface to an operator network. For a native
# (systemd) deployment change `server backend:8080` to `server 127.0.0.1:8080`.

worker_processes auto;
events { worker_connections 1024; }

http {
    # --- Edge rate limits (complement, not replace, the app limits) ---------
    limit_req_zone  $binary_remote_addr zone=api_general:10m rate=20r/s;
    limit_req_zone  $binary_remote_addr zone=api_auth:10m    rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=perip:10m;

    upstream jarvis_backend {
        server backend:8080;
        keepalive 16;
    }

    # Redirect plain HTTP to HTTPS (health probes may still hit HTTP directly).
    server {
        listen 80;
        server_name api.example.com;
        location /healthz { proxy_pass http://jarvis_backend; }
        location / { return 308 https://$host$request_uri; }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name api.example.com;               # trusted host (exact match)

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        # Bound request bodies at the edge (payment multipart is the largest).
        # Backend limit is 10 MiB of image bytes plus bounded multipart framing.
        client_max_body_size 11m;
        limit_conn perip 32;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-ID      $request_id;
        proxy_read_timeout 30s;

        # Liveness/readiness pass straight through (no auth, no host coupling).
        location = /healthz { proxy_pass http://jarvis_backend; }
        location = /readyz  { proxy_pass http://jarvis_backend; }

        # Admin console + admin API: tighter rate limit and OPTIONAL allowlist.
        location ~ ^/(admin|api/admin/) {
            # allow 10.0.0.0/8;      # operator/VPN network
            # allow 203.0.113.0/24;
            # deny all;
            limit_req zone=api_auth burst=10 nodelay;
            proxy_pass http://jarvis_backend;
        }

        # Client activation/update + purchase endpoints.
        location ~ ^/(v1/client/|api/(purchases|device-challenges)) {
            limit_req zone=api_auth burst=20 nodelay;
            proxy_pass http://jarvis_backend;
        }

        location / {
            limit_req zone=api_general burst=40 nodelay;
            proxy_pass http://jarvis_backend;
        }

        # Do not expose the metrics endpoint publicly; scrape it internally.
        location = /metrics { deny all; }
    }
}
