# JARVIS product backend — Docker Compose deployment.
#
#   docker compose -f deploy/docker/docker-compose.yml up -d --build
#
# The backend port is NOT published to the host: only the TLS reverse proxy is
# reachable from outside, and it forwards to the backend over the private
# compose network. Provide real secrets via backend.env (owner-only, untracked)
# and real TLS certs under ./certs before starting.
services:
  backend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    # Owner-only env file materialized from your secret store (never committed).
    env_file:
      - ../env/backend.env
    volumes:
      # Persistent SQLite databases + payment evidence live on a named volume.
      - jarvis-data:/var/lib/jarvis
    # No `ports:` here on purpose — the backend is internal-only.
    expose:
      - "8080"
    restart: unless-stopped

  proxy:
    image: nginx:1.27-alpine
    depends_on:
      - backend
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ../reverse-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      # Provide fullchain.pem + privkey.pem here (owner-only, untracked).
      - ./certs:/etc/nginx/certs:ro
    restart: unless-stopped

volumes:
  jarvis-data:
