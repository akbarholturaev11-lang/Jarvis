# JARVIS product backend — Docker Compose deployment.
#
# Export every JARVIS_COMPOSE_* variable below as an ABSOLUTE host path before
# running Compose.  Required substitutions fail immediately when a value is
# absent.  The backend port is never published; nginx is its only network peer.
services:
  backend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    env_file:
      - "${JARVIS_COMPOSE_ENV_FILE:?set an absolute host path to backend.env}"
    environment:
      # These container paths deliberately override any host paths generated in
      # backend.env.  Validation therefore has to run inside this container.
      JARVIS_BACKEND_DATA_DIR: /var/lib/jarvis/data
      JARVIS_RELEASE_ARTIFACT_ROOT: /var/lib/jarvis/artifacts
      JARVIS_ENTITLEMENT_PRIVATE_KEY_FILE: /run/jarvis-secrets/entitlement.key
      JARVIS_ACTIVATION_PEPPER_FILE: /run/jarvis-secrets/activation.pepper
      JARVIS_ADMIN_MFA_KEY_FILE: /run/jarvis-secrets/admin-mfa.key
      # nginx has a fixed address on this private network.  Uvicorn does not
      # rewrite forwarded headers; the application validates this exact peer.
      JARVIS_TRUSTED_PROXIES: 172.30.250.2/32
    volumes:
      - type: volume
        source: jarvis-data
        target: /var/lib/jarvis
      - type: bind
        source: "${JARVIS_COMPOSE_ENTITLEMENT_KEY_FILE:?set an absolute host path to entitlement.key}"
        target: /run/jarvis-secrets/entitlement.key
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: "${JARVIS_COMPOSE_ACTIVATION_PEPPER_FILE:?set an absolute host path to activation.pepper}"
        target: /run/jarvis-secrets/activation.pepper
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: "${JARVIS_COMPOSE_ADMIN_MFA_KEY_FILE:?set an absolute host path to admin-mfa.key}"
        target: /run/jarvis-secrets/admin-mfa.key
        read_only: true
        bind:
          create_host_path: false
    expose:
      - "8080"
    networks:
      jarvis-private:
        ipv4_address: 172.30.250.3
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,mode=0700
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  proxy:
    image: nginx:1.27-alpine
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ../reverse-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - type: bind
        source: "${JARVIS_COMPOSE_TLS_CERT_DIR:?set an absolute host path to the TLS certificate directory}"
        target: /etc/nginx/certs
        read_only: true
        bind:
          create_host_path: false
    networks:
      jarvis-private:
        ipv4_address: 172.30.250.2
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

volumes:
  jarvis-data:

networks:
  jarvis-private:
    internal: true
    ipam:
      config:
        - subnet: 172.30.250.0/29
